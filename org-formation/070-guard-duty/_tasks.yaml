Parameters:
  <<: !Include '../_parameters.yaml'

  appName:
    Type: String
    Default: 'guardduty'

  accountId:
    Type: String
    Description: The identifier from the account used to manage GuardDuty
    Default: !Ref SecurityCentralAccount

  # Subset of commercial AWS regions where we deploy GuardDuty detectors, so
  # threat detection is active even in regions we don't otherwise use (a common
  # crypto-mining vector). This is not exhaustive — opt-in regions and newer
  # regions are excluded. Expand as needed.
  guardDutyRegions:
    Type: List<String>
    Default:
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - ca-central-1
      - eu-west-1
      - eu-west-2
      - eu-west-3
      - eu-central-1
      - eu-north-1
      - eu-south-1
      - ap-northeast-1
      - ap-northeast-2
      - ap-northeast-3
      - ap-southeast-1
      - ap-southeast-2
      - ap-south-1
      - sa-east-1
      - af-south-1
      - me-south-1

GuardDuty:
  Type: update-stacks
  Template: ./guardduty.yaml
  StackName: !Sub '${resourcePrefix}-${appName}'
  StackDescription: GuardDuty
  DefaultOrganizationBinding:
    IncludeMasterAccount: false
    Account: !Ref accountId
    Region: !Ref guardDutyRegions
  Parameters:
    resourcePrefix: !Ref resourcePrefix

# --- Notifications disabled for initial rollout. Uncomment to enable. ---
